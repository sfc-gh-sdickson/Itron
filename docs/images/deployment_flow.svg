<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="Arial, sans-serif">
  <rect width="900" height="700" fill="#f8fafc"/>
  <text x="450" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">Deployment Flow</text>
  <!-- Steps as connected boxes flowing down -->
  <rect x="300" y="55" width="300" height="45" rx="8" fill="#29b5e8" stroke="#1a8bb0"/>
  <text x="450" y="75" text-anchor="middle" font-size="11" fill="white" font-weight="bold">1. Database and Schema Setup</text>
  <text x="450" y="90" text-anchor="middle" font-size="9" fill="#e0f2fe">01_database_and_schema.sql</text>
  <path d="M450 100 L450 115" stroke="#64748b" stroke-width="2" marker-end="url(#arw)"/>
  <defs><marker id="arw" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/></marker></defs>
  <rect x="300" y="118" width="300" height="45" rx="8" fill="#29b5e8" stroke="#1a8bb0"/>
  <text x="450" y="138" text-anchor="middle" font-size="11" fill="white" font-weight="bold">2. Create Tables</text>
  <text x="450" y="153" text-anchor="middle" font-size="9" fill="#e0f2fe">02_create_tables.sql (21 tables)</text>
  <path d="M450 163 L450 178" stroke="#64748b" stroke-width="2" marker-end="url(#arw)"/>
  <rect x="300" y="181" width="300" height="45" rx="8" fill="#f59e0b" stroke="#d97706"/>
  <text x="450" y="201" text-anchor="middle" font-size="11" fill="white" font-weight="bold">3. Load ESGOnt Ontology</text>
  <text x="450" y="216" text-anchor="middle" font-size="9" fill="#fef3c7">03_ESGOnt_Ontology.sql (37 classes, 29 SDG maps)</text>
  <path d="M450 226 L450 241" stroke="#64748b" stroke-width="2" marker-end="url(#arw)"/>
  <rect x="300" y="244" width="300" height="45" rx="8" fill="#22c55e" stroke="#16a34a"/>
  <text x="450" y="264" text-anchor="middle" font-size="11" fill="white" font-weight="bold">4. Generate Synthetic Data</text>
  <text x="450" y="279" text-anchor="middle" font-size="9" fill="#dcfce7">04_generate_synthetic_data.sql (200K+ rows)</text>
  <path d="M450 289 L450 304" stroke="#64748b" stroke-width="2" marker-end="url(#arw)"/>
  <rect x="300" y="307" width="300" height="45" rx="8" fill="#3b82f6" stroke="#2563eb"/>
  <text x="450" y="327" text-anchor="middle" font-size="11" fill="white" font-weight="bold">5. Create Analytical Views</text>
  <text x="450" y="342" text-anchor="middle" font-size="9" fill="#dbeafe">05_create_views.sql (8 views)</text>
  <path d="M450 352 L450 367" stroke="#64748b" stroke-width="2" marker-end="url(#arw)"/>
  <rect x="300" y="370" width="300" height="45" rx="8" fill="#3b82f6" stroke="#2563eb"/>
  <text x="450" y="390" text-anchor="middle" font-size="11" fill="white" font-weight="bold">6. Create Semantic Views</text>
  <text x="450" y="405" text-anchor="middle" font-size="9" fill="#dbeafe">06_create_semantic_views.sql (2 views)</text>
  <path d="M450 415 L450 430" stroke="#64748b" stroke-width="2" marker-end="url(#arw)"/>
  <rect x="300" y="433" width="300" height="45" rx="8" fill="#22c55e" stroke="#16a34a"/>
  <text x="450" y="453" text-anchor="middle" font-size="11" fill="white" font-weight="bold">7. Create Cortex Search</text>
  <text x="450" y="468" text-anchor="middle" font-size="9" fill="#dcfce7">07_create_cortex_search.sql</text>
  <path d="M450 478 L450 493" stroke="#64748b" stroke-width="2" marker-end="url(#arw)"/>
  <rect x="300" y="496" width="300" height="45" rx="8" fill="#8b5cf6" stroke="#7c3aed"/>
  <text x="450" y="516" text-anchor="middle" font-size="11" fill="white" font-weight="bold">8. ML Models (Optional)</text>
  <text x="450" y="531" text-anchor="middle" font-size="9" fill="#ede9fe">08_ml_models.ipynb</text>
  <path d="M450 541 L450 556" stroke="#64748b" stroke-width="2" marker-end="url(#arw)"/>
  <rect x="300" y="559" width="300" height="45" rx="8" fill="#8b5cf6" stroke="#7c3aed"/>
  <text x="450" y="579" text-anchor="middle" font-size="11" fill="white" font-weight="bold">9. ML Model Functions</text>
  <text x="450" y="594" text-anchor="middle" font-size="9" fill="#ede9fe">09_ml_model_functions.sql (5 UDFs)</text>
  <path d="M450 604 L450 619" stroke="#64748b" stroke-width="2" marker-end="url(#arw)"/>
  <rect x="300" y="622" width="300" height="45" rx="8" fill="#ef4444" stroke="#dc2626"/>
  <text x="450" y="642" text-anchor="middle" font-size="11" fill="white" font-weight="bold">10. Create Agent</text>
  <text x="450" y="657" text-anchor="middle" font-size="9" fill="#fecaca">10_create_agent.sql (ITRON_AGENT)</text>
  <!-- Side annotations -->
  <text x="620" y="210" font-size="9" fill="#92400e">Deterministic Rules</text>
  <text x="620" y="395" font-size="9" fill="#1d4ed8">Cortex Analyst</text>
  <text x="620" y="583" font-size="9" fill="#6d28d9">Probabilistic ML</text>
  <text x="150" y="140" font-size="10" fill="#475569" font-weight="bold">Infrastructure</text>
  <text x="150" y="270" font-size="10" fill="#475569" font-weight="bold">Data Loading</text>
  <text x="150" y="390" font-size="10" fill="#475569" font-weight="bold">Intelligence Layer</text>
  <text x="150" y="580" font-size="10" fill="#475569" font-weight="bold">ML + Agent</text>
</svg>
